services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: schemesathi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data", "./server/database/migration.sql:/docker-entrypoint-initdb.d/001-migration.sql"]
  api:
    build: ./server
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/schemesathi
      CLIENT_URL: http://localhost:5173
    ports: ["5000:5000"]
    depends_on: [db]
volumes:
  postgres_data:
